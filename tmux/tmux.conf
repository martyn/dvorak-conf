# ============================================================================
#  tmux.conf  —  laptop  (tokyonight-flavored dev setup, dvorak keys)
# ============================================================================

# --- Terminal / truecolor ---------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:RGB"          # 24-bit color
set -ga terminal-overrides 'xterm*:smcup@:rmcup@'   # keep native scrollback
set -g default-command /bin/zsh
set -g default-shell   /bin/zsh

# Snappier key response + bigger scrollback
set -sg escape-time 10
set -g  history-limit 100000
set -g  focus-events on
set -g  display-time 2000        # messages stay up long enough to read
set -g  detach-on-destroy off    # killing a session hops to the next one
set -g  set-titles on
set -g  set-titles-string "#S · #{pane_title}"   # kitty/OS title shows live agent status

# --- Prefix -----------------------------------------------------------------
unbind C-b
set -g prefix C-u

# --- Vim-style pane navigation (dvorak: t/n/h/s) ----------------------------
setw -g mode-keys vi
unbind-key j ; bind-key t select-pane -D
unbind-key k ; bind-key n select-pane -U
unbind-key h ; bind-key h select-pane -L
unbind-key l ; bind-key s select-pane -R

# Resize = shifted nav keys, repeatable (hold prefix once, tap away)
bind -r T resize-pane -D 3
bind -r N resize-pane -U 3
bind -r H resize-pane -L 5
bind -r S resize-pane -R 5

# Splits: \ and - sit side by side on dvorak's right pinky
bind '\' split-window -h -c "#{pane_current_path}"
bind  -  split-window   -c "#{pane_current_path}"
bind '"' split-window   -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind  c  new-window     -c "#{pane_current_path}"

# --- Windows / sessions: moving around --------------------------------------
bind C-u  last-window        # double-tap prefix = bounce between two windows
bind Tab  switch-client -l   # bounce between two sessions
bind -r Left  previous-window
bind -r Right next-window
bind Up   resize-pane -Z     # zoom pane full-screen (again to restore)
bind Down choose-tree -Zs    # birds-eye view of every session/window/pane
bind w    choose-tree -Zs
bind -r < swap-window -d -t -1   # drag window left in the tab bar
bind -r > swap-window -d -t +1   # drag window right

# No-prefix window jumps
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Popups -----------------------------------------------------------------
# Scratch terminal: floats over everything, survives closing, prefix+g again to dismiss
bind g if-shell -F '#{==:#{session_name},scratch}' 'detach-client' \
    'display-popup -E -w 80% -h 75% "tmux new-session -A -s scratch"'

# Worktree jump: menu of king_alfred worktrees -> window per worktree (reused if open)
bind W run-shell "~/.tmux/worktree-menu.sh"

# Mission control: menu of every claude pane across all sessions, live status, jump on select
bind o run-shell "~/.tmux/agents-menu.sh"

# Quick menu of everything below, in case a binding slips your mind
bind e display-menu -T "#[align=centre,bold] tmux " -x C -y C \
    "split right (\\)"        '\' "split-window -h -c '#{pane_current_path}'" \
    "split below (-)"         -   "split-window -c '#{pane_current_path}'" \
    "zoom pane (Up)"          Up  "resize-pane -Z" \
    "all sessions (Down)"     Down "choose-tree -Zs" \
    "scratch popup (g)"       g   "display-popup -E -w 80% -h 75% \"tmux new-session -A -s scratch\"" \
    "worktree jump (W)"       W   "run-shell '~/.tmux/worktree-menu.sh'" \
    "agent overview (o)"      o   "run-shell '~/.tmux/agents-menu.sh'" \
    "sync panes (y)"          y   "set -w synchronize-panes" \
    "rename window (,)"       ,   "command-prompt -I '#W' 'rename-window %%'" \
    "rename session ($)"      $   "command-prompt -I '#S' 'rename-session %%'" \
    "log pane (P)"            P   "pipe-pane -o 'cat >>$HOME/#W-tmux.log'" \
    "reload config (r)"       r   "source-file ~/.tmux.conf"

# --- Copy mode (Wayland clipboard) ------------------------------------------
bind Escape copy-mode
unbind p ; bind p paste-buffer
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'r' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
set -g set-clipboard on

bind C-v run "tmux set-buffer \"$(wl-paste)\"; tmux paste-buffer"
bind C-c run "tmux save-buffer - | wl-copy"
bind C-o run-shell "xdg-open $(tmux show-buffer)"   # open URL in buffer

# --- Mouse ------------------------------------------------------------------
set-option -g mouse on
bind -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# --- Windows / panes --------------------------------------------------------
set-window-option -g automatic-rename off
set-option -g aggressive-resize on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

setw -g monitor-activity on
set  -g visual-activity off
setw -g monitor-bell on          # claude terminal_bell notifications flash the tab red

bind ` select-pane -t :.+

# Broadcast typing to every pane in the window (status bar shows SYNC)
bind y set -w synchronize-panes \; display "sync: #{?synchronize-panes,ON,off}"

# Pipe current pane to a log file (toggle)
bind-key P pipe-pane -o "cat >>$HOME/#W-tmux.log" \; display-message "Toggled logging to $HOME/#W-tmux.log"

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "  tmux.conf reloaded"

# ============================================================================
#  THEME  —  tokyonight  (block-element separators: render in any font)
# ============================================================================
# palette:  bg #1a1b26  bg2 #16161e  panel #3b4261  fg #c0caf5  grey #565f89
#           blue #7aa2f7  green #9ece6a  purple #bb9af7  orange #e0af68
#           cyan #7dcfff  red #f7768e

set -g status on
set -g status-position bottom
set -g status-interval 5     # keep the per-tab agent lamps fresh
set -g status-justify absolute-centre
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g status-left-length  60
set -g status-right-length 90

# Left: host segment doubles as a mode lamp —
#   blue = idle · orange = prefix armed · purple = copy mode
set -g status-left "#{?client_prefix,#[fg=#16161e#,bg=#e0af68#,bold] ^U ,#{?pane_in_mode,#[fg=#16161e#,bg=#bb9af7#,bold] COPY ,#[fg=#16161e#,bg=#7aa2f7#,bold] #h }}#[fg=#c0caf5,bg=#3b4261,bold] #S #[fg=#3b4261,bg=#16161e]▌ "

# Right: sync warning + battery + date + time
set -g status-right "#{?pane_synchronized,#[fg=#16161e#,bg=#f7768e#,bold] SYNC #[default] ,}#(~/.tmux/battery.sh) #[fg=#565f89]│ #[fg=#7dcfff]%a %d %b #[fg=#7aa2f7]▐#[fg=#16161e,bg=#7aa2f7,bold]%R "

# Window tabs (current = green pill; Z = zoomed)
# Claude panes announce status via pane_title (⠂ working · ✳ waiting) — first
# char of the title becomes a per-tab lamp so you can read the fleet at a glance.
set -g window-status-separator ""
set -g window-status-format         "#[fg=#565f89,bg=#16161e]  #I #[fg=#a9b1d6]#W#{?#{==:#{pane_current_command},claude}, #{=1:pane_title},}  "
set -g window-status-current-format "#[fg=#9ece6a,bg=#16161e]▐#[fg=#16161e,bg=#9ece6a,bold] #I #W#{?#{==:#{pane_current_command},claude}, #{=1:pane_title},}#{?window_zoomed_flag, Z,} #[fg=#9ece6a,bg=#16161e]▌"
set -g window-status-activity-style "fg=#e0af68,bg=#16161e"
set -g window-status-bell-style     "fg=#16161e,bg=#f7768e,bold"

# Pane borders (active border tracks the mode lamp)
set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "#{?pane_in_mode,fg=#bb9af7,fg=#7aa2f7}"
set -g pane-border-lines single
set -g pane-border-indicators colour

# Per-pane title bar in split windows: what's running + its live pane_title
set -g pane-border-status top
set -g pane-border-format " #{?#{==:#{pane_current_command},claude},#[fg=#e0af68],#[fg=#565f89]}#{pane_index} · #{pane_current_command} · #{=|48|…:pane_title} "

# Popups + menus
set -g popup-border-lines rounded
set -g popup-border-style "fg=#7aa2f7"
set -g menu-style "fg=#c0caf5,bg=#16161e"
set -g menu-selected-style "fg=#16161e,bg=#7aa2f7,bold"
set -g menu-border-lines rounded
set -g menu-border-style "fg=#7aa2f7"

# Messages / command prompt
set -g message-style         "fg=#16161e,bg=#e0af68,bold"
set -g message-command-style "fg=#c0caf5,bg=#3b4261"

# Copy-mode selection + search
set -g mode-style "fg=#16161e,bg=#bb9af7,bold"

# Clock (prefix + t in clock mode)
set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24
